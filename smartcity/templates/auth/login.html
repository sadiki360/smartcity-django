<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><title>Connexion — SmartCity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body{background:linear-gradient(135deg,#1B2E5E,#0f1e3d);min-height:100vh;display:flex;align-items:center}
        .card{border-radius:16px;overflow:hidden}
        .card-header{background:#C8973A;color:white;text-align:center;padding:2rem}
        .btn-login{background:#1B2E5E;color:white;width:100%;padding:.75rem;border:none;border-radius:8px;font-weight:600}
        .btn-login:hover{background:#0f1e3d;color:white}
    </style>
</head>
<body>
<div class="container"><div class="row justify-content-center"><div class="col-md-5">
<div class="card shadow-lg">
    <div class="card-header">
        <i class="fas fa-city fa-3x mb-2 d-block"></i>
        <h2 class="fw-800 mb-0">SmartCity</h2>
        <p class="mb-0 opacity-75">Plateforme de gestion urbaine — FST Tanger</p>
    </div>
    <div class="card-body p-4">
        {% if form.errors %}<div class="alert alert-danger">Identifiants incorrects.</div>{% endif %}
        <form method="post">{% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control form-control-lg" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Mot de passe</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt me-2"></i>Se connecter</button>
        </form>
        <p class="text-center text-muted mt-3 small">Admin par défaut : <strong>admin</strong> / <strong>admin123</strong></p>
    </div>
</div>
</div></div></div>
</body></html>
